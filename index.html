<!DOCTYPE html>
<html>
<head>
  <title>Flight Search</title>
</head>
<body>

<h2>Flight Search</h2>

<input id="origin" placeholder="Origin (e.g. JFK)">
<input id="destination" placeholder="Destination (e.g. LAX)">
<input id="date" placeholder="YYYY-MM-DD">

<button onclick="searchFlights()">Search</button>

<h3>Results:</h3>
<div id="results"></div>

<script>
async function searchFlights() {
    const origin = document.getElementById("origin").value;
    const destination = document.getElementById("destination").value;
    const date = document.getElementById("date").value;

    const response = await fetch(
        "https://epiclike-synaptically-tyesha.ngrok-free.dev/search_flights",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "ngrok-skip-browser-warning": "true"
            },
            body: JSON.stringify({
                origin: origin,
                destination: destination,
                outbound_date: date
            })
        }
    );

    const data = await response.json();

    let html = "";
    data.results.forEach(f => {
        html += `
            <p>
                <b>${f.title}</b><br>
                ${f.snippet}<br>
                <a href="${f.link}" target="_blank">View</a>
            </p>
            <hr>
        `;
    });

    document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
