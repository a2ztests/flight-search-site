<!DOCTYPE html>
<html>
<head>
  <title>Flight Search</title>
</head>
<body>

<h2>Flight Search</h2>

<input id="origin" placeholder="Origin (e.g. JFK)">
<input id="destination" placeholder="Destination (e.g. LAX)">
<input id="date" placeholder="YYYY-MM-DD">

<button onclick="searchFlights()">Search</button>

<h3>Results:</h3>
<div id="results"></div>

<script>
async function searchFlights() {
    const origin = document.getElementById("origin").value;
    const destination = document.getElementById("destination").value;
    const date = document.getElementById("date").value;

    const url = "https://YOUR-NGROK-URL.ngrok-free.dev/search_flights";

    console.log("Calling API:", url);

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "ngrok-skip-browser-warning": "true"
            },
            body: JSON.stringify({
                origin,
                destination,
                outbound_date: date
            })
        });

        console.log("Status:", response.status);

        const data = await response.json();
        console.log("DATA:", data);

        let html = `<p><b>Flights found: ${data.flights_found}</b></p>`;

        data.results.forEach(f => {
            html += `
                <p>
                    <b>${f.title}</b><br>
                    ${f.snippet}<br>
                    <a href="${f.link}" target="_blank">Open</a>
                </p><hr>
            `;
        });

        document.getElementById("results").innerHTML = html;

    } catch (err) {
        console.error("ERROR:", err);
        document.getElementById("results").innerHTML =
            "<p style='color:red'>Request failed. Check console.</p>";
    }
}
</script>

</body>
</html>
